<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>岗位列表 - 智能推荐</title>
  <style>
    :root {
      --primary: #667eea;
      --primary2: #764ba2;
      --orange: #f97316;
      --blue: #3b82f6;
      --green: #10b981;
      --text: #1e293b;
      --sub: #64748b;
      --border: #e2e8f0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      padding-bottom: 140px;
    }

    /* ===== HEADER ===== */
    .header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary2) 100%); padding: 44px 16px 12px; color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(102,126,234,0.2); }
    .header .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .header .logo { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
    .header .more-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    /* Search Bar */
    .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-bar input { flex: 1; padding: 12px 16px; border-radius: 24px; border: none; font-size: 14px; outline: none; background: rgba(255,255,255,0.95); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .search-bar input::placeholder { color: #94a3b8; }

    /* ===== QUICK CATEGORIES (鱼泡风格) ===== */
    .quick-cats { display: flex; gap: 12px; padding: 12px 16px; overflow-x: auto; background: white; scrollbar-width: none; }
    .quick-cats::-webkit-scrollbar { display: none; }
    .cat-item { display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 52px; cursor: pointer; }
    .cat-icon { width: 44px; height: 44px; border-radius: 12px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: all 0.2s; }
    .cat-text { font-size: 12px; color: #64748b; font-weight: 500; }
    .cat-item.active .cat-icon { background: linear-gradient(135deg, var(--primary), var(--primary2)); }
    .cat-item.active .cat-text { color: var(--primary); }

    /* ===== FILTER BAR (鱼泡风格) ===== */
    .filter-bar { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; background: white; border-bottom: 1px solid var(--border); scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-item { padding: 6px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; border: none; background: #f0f4f8; color: var(--sub); cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .filter-item.active { background: linear-gradient(135deg, var(--primary), var(--primary2)); color: white; box-shadow: 0 2px 8px rgba(102,126,234,0.3); }

    /* ===== JOB LIST ===== */
    .job-list { padding: 12px 16px; }

    /* Job Card - Optimized (鱼泡风格) */
    .job-card { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 8px rgba(0,0,0,0.04); cursor: pointer; transition: all 0.2s; border: 1px solid #f0f2f5; }
    .job-card:active { transform: scale(0.98); background: #f8fafc; }

    .job-card .top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .job-card .title-wrap { flex: 1; min-width: 0; }
    .job-card .title { font-size: 16px; font-weight: 700; color: #1e293b; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; }
    .job-card .salary { font-size: 18px; font-weight: 800; color: #2563eb; white-space: nowrap; margin-left: 10px; flex-shrink: 0; }

    .job-card .company-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .job-card .company-logo { width: 20px; height: 20px; border-radius: 4px; background: linear-gradient(135deg, var(--primary), var(--primary2)); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: 700; flex-shrink: 0; }
    .job-card .company-name { font-size: 12px; color: #64748b; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-card .verified-badge { font-size: 10px; color: #16a34a; background: #f0fdf4; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }

    .job-card .tags-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag-sm { padding: 4px 10px; border-radius: 4px; font-size: 12px; background: #f1f5f9; color: #64748b; font-weight: 500; }
    .tag-sm.highlight { background: #fff7ed; color: #ea580c; }
    .tag-sm.green { background: #f0fdf4; color: #16a34a; }

    .job-card .bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px dashed #e2e8f0; }
    .job-card .bottom .location { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748b; flex: 1; min-width: 0; }
    .job-card .bottom .location-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-card .bottom .distance { font-size: 12px; font-weight: 600; color: #16a34a; background: #f0fdf4; padding: 3px 8px; border-radius: 12px; white-space: nowrap; margin-left: 6px; }
    .job-card .bottom .reply { font-size: 11px; color: #94a3b8; display: flex; align-items: center; gap: 2px; }

    /* 匹配度徽章 */
    .match-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
    .match-badge.high { background: #dcfce7; color: #16a34a; }
    .match-badge.medium { background: #fef3c7; color: #d97706; }
    .match-badge.low { background: #f1f5f9; color: #64748b; }

    /* Empty State */
    .empty { text-align: center; padding: 60px 20px; }
    .empty .empty-icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty .empty-text { font-size: 14px; color: #94a3b8; }

    /* Loading */
    .loading { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }
    .loading::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
  </style>
</head>
<body>

  <!-- Header (鱼泡风格) -->
  <header class="header">
    <div class="top">
      <div class="logo">召集吧</div>
      <button class="more-btn">☰</button>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜索岗位、公司、标签..." oninput="handleSearch()">
    </div>
  </header>

  <!-- Quick Categories -->
  <div class="quick-cats">
    <div class="cat-item active" onclick="setCategory('all', this)">
      <div class="cat-icon">🔥</div>
      <div class="cat-text">推荐</div>
    </div>
    <div class="cat-item" onclick="setCategory('fulltime', this)">
      <div class="cat-icon">💼</div>
      <div class="cat-text">全职</div>
    </div>
    <div class="cat-item" onclick="setCategory('intern', this)">
      <div class="cat-icon">🎓</div>
      <div class="cat-text">实习</div>
    </div>
    <div class="cat-item" onclick="setCategory('parttime', this)">
      <div class="cat-icon">⏰</div>
      <div class="cat-text">兼职</div>
    </div>
    <div class="cat-item" onclick="setCategory('volunteer', this)">
      <div class="cat-icon">🤝</div>
      <div class="cat-text">志愿</div>
    </div>
  </div>

  <!-- Filter Bar (智能推荐风格) -->
  <div class="filter-bar">
    <div class="filter-item active" onclick="setFilter('smart', this)">智能推荐</div>
    <div class="filter-item" onclick="setFilter('latest', this)">最新发布</div>
    <div class="filter-item" onclick="setFilter('nearest', this)">距离最近</div>
    <div class="filter-item" onclick="setFilter('best-match', this)">最相符</div>
    <div class="filter-item" onclick="setFilter('high-salary', this)">薪资最高</div>
  </div>

  <!-- Job List -->
  <div class="job-list" id="jobList"></div>

  <script>
    // 模拟用户画像和搜索历史
    const userProfile = {
      skills: ['Java', 'Python', '前端', 'Spring'],
      preferredTypes: ['fulltime', 'intern'],
      salaryRange: [8, 30], // K
      location: '海淀区',
      searchHistory: ['Java', '前端', '实习', '兼职'],
      viewHistory: [1, 2, 3], // 浏览过的岗位ID
      applyHistory: [1] // 申请过的岗位ID
    };

    const mockJobs = [
      {
        id: 1,
        title: 'Java开发工程师',
        salary: '15-25K',
        type: 'fulltime',
        company: '某某科技有限公司',
        logo: '科',
        tags: ['Java', 'Spring', 'MySQL', '后端'],
        benefits: ['五险一金', '年终奖', '带薪年假', '餐补', '交通补', '周末双休'],
        address: '北京市海淀区中关村软件园二期A座',
        distance: 3.2,
        requirements: '1. 本科及以上学历，计算机相关专业\n2. 熟练掌握Java语言，有Spring Boot项目经验\n3. 熟悉MySQL数据库，有性能优化经验优先\n4. 良好的编程习惯和团队协作能力',
        time: '2小时前',
        timestamp: Date.now() - 2 * 60 * 60 * 1000,
        reply: '今日回复10次+',
        caller: '企业',
        verified: true,
        viewCount: 120,
        applyCount: 45
      },
      {
        id: 2,
        title: '前端开发实习生',
        salary: '200-300/天',
        type: 'intern',
        company: '创新互联网公司',
        logo: '创',
        tags: ['前端', 'Vue', 'React', '实习'],
        benefits: ['实习证明', '导师带教', '转正机会', '下午茶', '团建'],
        address: '北京市朝阳区望京SOHO T1',
        distance: 5.8,
        requirements: '1. 本科在读学生，计算机相关专业\n2. 熟悉Vue或React框架\n3. 熟悉HTML/CSS/JavaScript\n4. 每周至少实习3天',
        time: '5小时前',
        timestamp: Date.now() - 5 * 60 * 60 * 1000,
        reply: '今日回复8次+',
        caller: '企业',
        verified: true,
        viewCount: 89,
        applyCount: 32
      },
      {
        id: 3,
        title: '周末兼职客服',
        salary: '200-300/天',
        type: 'parttime',
        company: '某教育机构',
        logo: '教',
        tags: ['兼职', '客服', '周末', '无需经验'],
        benefits: ['日结', '工作轻松', '提供培训'],
        address: '北京市海淀区学院路30号',
        distance: 1.2,
        requirements: '1. 普通话标准\n2. 有耐心，善于沟通\n3. 周末可到岗',
        time: '1天前',
        timestamp: Date.now() - 24 * 60 * 60 * 1000,
        reply: '今日回复5次+',
        caller: '个人',
        verified: false,
        viewCount: 56,
        applyCount: 18
      },
      {
        id: 4,
        title: '义卖活动志愿者',
        salary: '公益',
        type: 'volunteer',
        company: '爱心公益协会',
        logo: '爱',
        tags: ['志愿', '公益', '义卖', '周末'],
        benefits: ['志愿服务证书', '公益时长', '免费午餐', '团队氛围好'],
        address: '北京市朝阳区三里屯太古里',
        distance: 8.5,
        requirements: '1. 年满18岁\n2. 热心公益，有责任心\n3. 周末有充足时间',
        time: '2天前',
        timestamp: Date.now() - 48 * 60 * 60 * 1000,
        caller: '组织',
        verified: true,
        viewCount: 34,
        applyCount: 12
      },
      {
        id: 5,
        title: 'Python算法工程师',
        salary: '20-35K',
        type: 'fulltime',
        company: 'AI创新公司',
        logo: 'AI',
        tags: ['Python', '机器学习', '深度学习', '算法'],
        benefits: ['五险一金', '股票期权', '弹性工作', '健身房', '零食饮料'],
        address: '北京市海淀区中关村大街1号',
        distance: 4.1,
        requirements: '1. 硕士及以上学历，计算机/数学相关专业\n2. 熟悉Python，有机器学习项目经验\n3. 熟悉PyTorch或TensorFlow\n4. 有NLP或计算机视觉经验优先',
        time: '3天前',
        timestamp: Date.now() - 72 * 60 * 60 * 1000,
        reply: '今日回复15次+',
        caller: '企业',
        verified: true,
        viewCount: 78,
        applyCount: 23
      }
    ];

    let currentCategory = 'all';
    let currentFilter = 'smart';
    let jobs = [...mockJobs];

    // 渲染岗位列表
    function renderJobs() {
      const list = document.getElementById('jobList');
      list.innerHTML = '';

      if (jobs.length === 0) {
        list.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <div class="empty-text">暂无匹配岗位</div>
          </div>
        `;
        return;
      }

      jobs.forEach(job => {
        const card = document.createElement('div');
        card.className = 'job-card';

        // 计算匹配度
        const matchScore = calculateMatchScore(job);
        const matchBadge = getMatchBadge(matchScore);

        card.innerHTML = `
          <div class="top">
            <div class="title-wrap">
              <div class="title">${job.title} ${matchBadge}</div>
            </div>
            <div class="salary">${job.salary}</div>
          </div>
          <div class="company-row">
            <div class="company-logo">${job.logo}</div>
            <div class="company-name">${job.company}</div>
            ${job.verified ? '<div class="verified-badge">已认证</div>' : ''}
          </div>
          <div class="tags-row">
            ${job.tags.slice(0, 4).map(tag => `<div class="tag-sm highlight">${tag}</div>`).join('')}
          </div>
          <div class="bottom">
            <div class="location">
              <span class="location-icon">📍</span>
              <span class="location-text">${job.address.split('区')[0]}区</span>
            </div>
            <div class="distance">${job.distance}km</div>
            <div class="reply">💬 ${job.reply || '今日回复'}</div>
          </div>
        `;
        list.appendChild(card);
      });
    }

    // 计算匹配度分数 (0-100)
    function calculateMatchScore(job) {
      let score = 0;
      const weights = {
        skills: 40,      // 技能匹配
        type: 20,        // 类型偏好
        location: 15,    // 位置
        salary: 10,      // 薪资
        history: 15      // 浏览/申请历史
      };

      // 1. 技能匹配 (40分)
      const skillMatches = job.tags.filter(tag => userProfile.skills.some(skill =>
        tag.toLowerCase().includes(skill.toLowerCase()) ||
        skill.toLowerCase().includes(tag.toLowerCase())
      ));
      score += (skillMatches.length / Math.max(job.tags.length, 1)) * weights.skills;

      // 2. 类型偏好 (20分)
      if (userProfile.preferredTypes.includes(job.type)) {
        score += weights.type;
      }

      // 3. 位置匹配 (15分)
      if (job.address.includes(userProfile.location)) {
        score += weights.location * 0.8; // 同区80%
      } else if (job.distance <= 5) {
        score += weights.location * 0.5; // 5km内50%
      } else if (job.distance <= 10) {
        score += weights.location * 0.3; // 10km内30%
      }

      // 4. 薪资匹配 (10分)
      const jobSalaryMin = parseInt(job.salary.match(/\d+/)?.[0] || '0');
      if (jobSalaryMin >= userProfile.salaryRange[0] && jobSalaryMin <= userProfile.salaryRange[1]) {
        score += weights.salary;
      }

      // 5. 浏览/申请历史 (15分)
      if (userProfile.viewHistory.includes(job.id)) {
        score += weights.history * 0.6;
      }
      if (userProfile.applyHistory.includes(job.id)) {
        score += weights.history * 0.9;
      }

      // 搜索历史匹配 (额外加分)
      const searchMatches = userProfile.searchHistory.filter(keyword =>
        job.title.includes(keyword) ||
        job.tags.some(tag => tag.includes(keyword))
      );
      score += searchMatches.length * 5;

      return Math.min(Math.round(score), 100);
    }

    // 获取匹配度徽章
    function getMatchBadge(score) {
      if (score >= 80) {
        return `<span class="match-badge high">匹配度 ${score}%</span>`;
      } else if (score >= 60) {
        return `<span class="match-badge medium">匹配度 ${score}%</span>`;
      } else {
        return `<span class="match-badge low">匹配度 ${score}%</span>`;
      }
    }

    // 智能推荐算法
    function smartRecommendation(jobs) {
      return [...jobs].sort((a, b) => {
        const scoreA = calculateMatchScore(a);
        const scoreB = calculateMatchScore(b);

        // 匹配度相同，考虑其他因素
        if (scoreA === scoreB) {
          // 优先显示已认证的
          if (a.verified !== b.verified) {
            return b.verified - a.verified;
          }
          // 其次看回复活跃度
          const replyA = parseInt(a.reply.match(/\d+/)?.[0] || '0');
          const replyB = parseInt(b.reply.match(/\d+/)?.[0] || '0');
          return replyB - replyA;
        }

        return scoreB - scoreA;
      });
    }

    // 设置分类
    function setCategory(type, el) {
      currentCategory = type;
      document.querySelectorAll('.cat-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');

      if (type === 'all') {
        jobs = [...mockJobs];
      } else {
        jobs = mockJobs.filter(j => j.type === type);
      }

      // 重新应用当前筛选
      setFilter(currentFilter, document.querySelector('.filter-item.active'));
    }

    // 设置筛选（智能推荐风格）
    function setFilter(type, el) {
      currentFilter = type;
      document.querySelectorAll('.filter-item').forEach(item => item.classList.remove('active'));
      el.classList.add('active');

      // 先按分类过滤
      let filtered = currentCategory === 'all' ? [...mockJobs] : mockJobs.filter(j => j.type === currentCategory);

      // 再按筛选类型排序
      if (type === 'smart') {
        // 智能推荐：综合评分排序
        filtered = smartRecommendation(filtered);
      } else if (type === 'latest') {
        // 最新发布：按时间戳排序
        filtered.sort((a, b) => b.timestamp - a.timestamp);
      } else if (type === 'nearest') {
        // 距离最近：按距离排序
        filtered.sort((a, b) => a.distance - b.distance);
      } else if (type === 'best-match') {
        // 最相符：按匹配度排序
        filtered.sort((a, b) => calculateMatchScore(b) - calculateMatchScore(a));
      } else if (type === 'high-salary') {
        // 薪资最高：按薪资排序
        filtered.sort((a, b) => {
          const salaryA = parseInt(a.salary.replace(/\D/g, '')) || 0;
          const salaryB = parseInt(b.salary.replace(/\D/g, '')) || 0;
          return salaryB - salaryA;
        });
      }

      jobs = filtered;
      renderJobs();
    }

    // 搜索
    function handleSearch() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      jobs = mockJobs.filter(j =>
        j.title.toLowerCase().includes(keyword) ||
        j.company.toLowerCase().includes(keyword) ||
        j.tags.some(tag => tag.toLowerCase().includes(keyword))
      );

      // 搜索时自动应用智能推荐排序
      jobs = smartRecommendation(jobs);
      renderJobs();
    }

    // 初始化
    renderJobs();
    // 默认应用智能推荐
    setFilter('smart', document.querySelector('.filter-item.active'));
  </script>
</body>
</html>
