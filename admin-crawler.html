<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>采集管理后台 - 召集吧</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    /* 头部 */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 4px;
    }
    .stat-card .label { color: #666; font-size: 14px; }
    .stat-card.pending .number { color: #f59e0b; }
    .stat-card.approved .number { color: #10b981; }
    .stat-card.rejected .number { color: #ef4444; }
    
    /* 操作栏 */
    .action-bar {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-success { background: #10b981; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-secondary { background: #f3f4f6; color: #666; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 筛选栏 */
    .filter-bar {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .filter-bar select {
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
    }
    
    /* 表格 */
    .table-container {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    th {
      background: #fafafa;
      font-weight: 600;
      color: #666;
      font-size: 13px;
      text-transform: uppercase;
    }
    tr:hover { background: #fafafa; }
    .job-title {
      font-weight: 500;
      color: #333;
      margin-bottom: 4px;
    }
    .job-meta {
      font-size: 12px;
      color: #999;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: #f0f0f0;
      border-radius: 4px;
      font-size: 12px;
      margin-right: 4px;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-approved { background: #d1fae5; color: #065f46; }
    .status-rejected { background: #fee2e2; color: #991b1b; }
    
    /* 系统推荐标记 */
    .system-recommended-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      margin-left: 8px;
    }
    
    /* 来源类型标记 */
    .source-type-badge {
      display: inline-block;
      padding: 2px 6px;
      background: #e0e7ff;
      color: #4f46e5;
      border-radius: 4px;
      font-size: 11px;
      margin-right: 4px;
    }
    
    /* 分页 */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 20px;
    }
    .page-btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }
    .page-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* 日志面板 */
    .log-panel {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
    }
    .log-panel h3 { margin-bottom: 16px; }
    .log-item {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .log-item .time { color: #999; margin-right: 12px; }
    .log-item.success { border-left: 3px solid #10b981; }
    .log-item.error { border-left: 3px solid #ef4444; }
    
    /* 加载动画 */
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* 复选框 */
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }
    
    /* 响应式 */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .action-bar { flex-direction: column; align-items: stretch; }
      table { font-size: 12px; }
      th, td { padding: 12px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <h1>🕷️ 采集管理后台</h1>
      <p>自动采集互联网招募信息，审核后同步至平台</p>
    </div>
    
    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="number" id="stat-total">-</div>
        <div class="label">总采集数</div>
      </div>
      <div class="stat-card pending">
        <div class="number" id="stat-pending">-</div>
        <div class="label">待审核</div>
      </div>
      <div class="stat-card approved">
        <div class="number" id="stat-approved">-</div>
        <div class="label">已上线</div>
      </div>
      <div class="stat-card rejected">
        <div class="number" id="stat-rejected">-</div>
        <div class="label">已拒绝</div>
      </div>
    </div>
    
    <!-- 操作栏 -->
    <div class="action-bar">
      <div style="display: flex; gap: 8px; flex-wrap: wrap;">
        <button class="btn btn-primary" onclick="triggerCrawl('all')" id="btn-crawl-all">
          <span>🚀</span> 全量采集
        </button>
        <button class="btn btn-secondary" onclick="triggerCrawl('yupao')" id="btn-crawl-yupao">
          <span>📱</span> 鱼泡网
        </button>
        <button class="btn btn-secondary" onclick="triggerCrawl('rss')" id="btn-crawl-rss">
          <span>📡</span> RSS源
        </button>
        <button class="btn btn-secondary" onclick="triggerCrawl('search')" id="btn-crawl-search">
          <span>🔍</span> 搜索引擎
        </button>
      </div>
      <button class="btn btn-secondary" onclick="loadStats()">
        <span>🔄</span> 刷新数据
      </button>
      <div class="filter-bar">
        <select id="filter-status" onchange="loadJobs()">
          <option value="">全部状态</option>
          <option value="pending" selected>待审核</option>
          <option value="approved">已上线</option>
          <option value="rejected">已拒绝</option>
        </select>
      </div>
      <div style="flex: 1;"></div>
      <button class="btn btn-success" onclick="batchApprove()" id="btn-batch-approve">
        <span>✓</span> 批量通过
      </button>
      <button class="btn btn-danger" onclick="batchReject()" id="btn-batch-reject">
        <span>✗</span> 批量拒绝
      </button>
    </div>
    
    <!-- 数据表格 -->
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th width="40"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
            <th>岗位信息</th>
            <th>薪资</th>
            <th>联系方式</th>
            <th>采集时间</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="job-list">
          <tr>
            <td colspan="7" style="text-align: center; padding: 40px; color: #999;">
              加载中...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>
    
    <!-- 日志面板 -->
    <div class="log-panel">
      <h3>📋 采集日志</h3>
      <div id="log-list">
        <div class="log-item">加载中...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000/api/v1';
    let currentPage = 1;
    let selectedIds = new Set();
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadStats();
      loadJobs();
      loadLogs();
    });
    
    // 加载统计
    async function loadStats() {
      try {
        const res = await fetch(`${API_BASE}/crawler/stats`);
        const data = await res.json();
        if (data.code === 0) {
          document.getElementById('stat-total').textContent = 
            data.data.pending_review + data.data.approved + data.data.rejected;
          document.getElementById('stat-pending').textContent = data.data.pending_review;
          document.getElementById('stat-approved').textContent = data.data.approved;
          document.getElementById('stat-rejected').textContent = data.data.rejected;
        }
      } catch (e) {
        console.error('加载统计失败:', e);
      }
    }
    
    // 加载岗位列表
    async function loadJobs(page = 1) {
      currentPage = page;
      const status = document.getElementById('filter-status').value;
      
      try {
        const url = `${API_BASE}/crawler/jobs?page=${page}&limit=10${status ? '&status=' + status : ''}`;
        const res = await fetch(url);
        const data = await res.json();
        
        if (data.code === 0) {
          renderJobs(data.data.list);
          renderPagination(data.data.pagination);
        }
      } catch (e) {
        document.getElementById('job-list').innerHTML = `
          <tr><td colspan="7" style="text-align: center; padding: 40px; color: #ef4444;">
            加载失败: ${e.message}
          </td></tr>
        `;
      }
    }
    
    // 渲染岗位列表
    function renderJobs(jobs) {
      const tbody = document.getElementById('job-list');
      
      if (jobs.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="7" style="text-align: center; padding: 40px; color: #999;">
            暂无数据
          </td></tr>
        `;
        return;
      }
      
      tbody.innerHTML = jobs.map(job => `
        <tr>
          <td><input type="checkbox" value="${job.id}" onchange="toggleSelect(${job.id})" 
            ${selectedIds.has(job.id) ? 'checked' : ''}></td>
          <td>
            <div class="job-title">
              ${escapeHtml(job.title)}
              ${job.system_recommended ? '<span class="system-recommended-badge">⭐ 系统推荐</span>' : ''}
            </div>
            <div class="job-meta">
              ${job.source_type ? `<span class="source-type-badge">${getSourceTypeText(job.source_type)}</span>` : ''}
              ${escapeHtml(job.company_name || '个人/商家')} · ${escapeHtml(job.work_location || '北京')}
            </div>
            <div style="margin-top: 4px;">
              ${(job.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
              ${(job.matched_keywords || []).map(k => `<span class="tag" style="background: #dbeafe; color: #1e40af;">${escapeHtml(k)}</span>`).join('')}
            </div>
          </td>
          <td>${escapeHtml(job.salary_text || '面议')}</td>
          <td>${escapeHtml(job.contact || job.phone || '-')}</td>
          <td>${formatDate(job.crawled_at)}</td>
          <td><span class="status-badge status-${job.status}">${getStatusText(job.status)}</span></td>
          <td>
            ${job.status === 'pending' ? `
              <button class="btn btn-success" onclick="approveJob(${job.id})" style="padding: 6px 12px; font-size: 12px;">通过</button>
              <button class="btn btn-danger" onclick="rejectJob(${job.id})" style="padding: 6px 12px; font-size: 12px;">拒绝</button>
            ` : '<span style="color: #999; font-size: 12px;">已处理</span>'}
          </td>
        </tr>
      `).join('');
    }
    
    // 渲染分页
    function renderPagination(pagination) {
      const { page, total_pages } = pagination;
      let html = '';
      
      html += `<button class="page-btn" onclick="loadJobs(${page - 1})" ${page <= 1 ? 'disabled' : ''}>上一页</button>`;
      
      for (let i = 1; i <= total_pages; i++) {
        if (i === 1 || i === total_pages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="page-btn ${i === page ? 'active' : ''}" onclick="loadJobs(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += `<span style="padding: 8px;">...</span>`;
        }
      }
      
      html += `<button class="page-btn" onclick="loadJobs(${page + 1})" ${page >= total_pages ? 'disabled' : ''}>下一页</button>`;
      
      document.getElementById('pagination').innerHTML = html;
    }
    
    // 加载日志
    async function loadLogs() {
      try {
        const res = await fetch(`${API_BASE}/crawler/logs?limit=10`);
        const data = await res.json();
        
        if (data.code === 0 && data.data.length > 0) {
          document.getElementById('log-list').innerHTML = data.data.map(log => `
            <div class="log-item ${log.status}">
              <span class="time">${formatDate(log.started_at)}</span>
              <span>${log.type === 'daily' ? '全量采集' : '增量采集'} - ${log.status === 'completed' ? '成功' : '失败'}</span>
              ${log.total_jobs !== undefined ? `<span style="color: #667eea; margin-left: 12px;">采集 ${log.total_jobs} 条</span>` : ''}
            </div>
          `).join('');
        } else {
          document.getElementById('log-list').innerHTML = '<div class="log-item">暂无日志</div>';
        }
      } catch (e) {
        document.getElementById('log-list').innerHTML = '<div class="log-item error">加载日志失败</div>';
      }
    }
    
    // 触发采集
    async function triggerCrawl(platform = 'all') {
      const btnId = platform === 'all' ? 'btn-crawl-all' : `btn-crawl-${platform}`;
      const btn = document.getElementById(btnId);
      const originalText = btn.innerHTML;
      
      // 禁用所有采集按钮
      document.querySelectorAll('[id^="btn-crawl"]').forEach(b => b.disabled = true);
      btn.innerHTML = '<span class="loading"></span> 采集中...';
      
      try {
        const res = await fetch(`${API_BASE}/crawler/trigger`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ platform: platform, options: { pages: 2, cities: ['北京', '上海', '广州'] } })
        });
        const data = await res.json();
        
        if (data.code === 0) {
          let msg = '';
          if (platform === 'all') {
            msg = `全量采集完成！\n鱼泡网: ${data.data.details.yupao.saved} 条\nRSS源: ${data.data.details.rss.saved} 条\n搜索引擎: ${data.data.details.search.saved} 条\n总计: ${data.data.total_saved} 条`;
          } else {
            msg = `采集完成！共采集 ${data.data.crawled} 条，保存 ${data.data.saved} 条`;
          }
          alert(msg);
          loadStats();
          loadJobs();
          loadLogs();
        } else {
          alert('采集失败: ' + data.message);
        }
      } catch (e) {
        alert('采集失败: ' + e.message);
      } finally {
        // 恢复所有按钮
        document.querySelectorAll('[id^="btn-crawl"]').forEach(b => b.disabled = false);
        btn.innerHTML = originalText;
      }
    }
    
    // 审核通过
    async function approveJob(id) {
      if (!confirm('确定要通过这条内容吗？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/crawler/jobs/${id}/review`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'approve' })
        });
        const data = await res.json();
        
        if (data.code === 0) {
          loadStats();
          loadJobs(currentPage);
        } else {
          alert('操作失败: ' + data.message);
        }
      } catch (e) {
        alert('操作失败: ' + e.message);
      }
    }
    
    // 审核拒绝
    async function rejectJob(id) {
      if (!confirm('确定要拒绝这条内容吗？')) return;
      
      try {
        const res = await fetch(`${API_BASE}/crawler/jobs/${id}/review`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'reject' })
        });
        const data = await res.json();
        
        if (data.code === 0) {
          loadStats();
          loadJobs(currentPage);
        } else {
          alert('操作失败: ' + data.message);
        }
      } catch (e) {
        alert('操作失败: ' + e.message);
      }
    }
    
    // 批量操作
    function toggleSelect(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      updateBatchButtons();
    }
    
    function toggleSelectAll() {
      const checkboxes = document.querySelectorAll('#job-list input[type="checkbox"]');
      const allChecked = document.getElementById('select-all').checked;
      
      checkboxes.forEach(cb => {
        cb.checked = allChecked;
        const id = parseInt(cb.value);
        if (allChecked) {
          selectedIds.add(id);
        } else {
          selectedIds.delete(id);
        }
      });
      updateBatchButtons();
    }
    
    function updateBatchButtons() {
      // 按钮始终可用，点击时检查是否有选中
    }
    
    async function batchApprove() {
      if (selectedIds.size === 0) {
        alert('请先勾选要通过的岗位');
        return;
      }
      if (!confirm(`确定要批量通过选中的 ${selectedIds.size} 条内容吗？`)) return;
      await batchReview('approve');
    }

    async function batchReject() {
      if (selectedIds.size === 0) {
        alert('请先勾选要拒绝的岗位');
        return;
      }
      if (!confirm(`确定要批量拒绝选中的 ${selectedIds.size} 条内容吗？`)) return;
      await batchReview('reject');
    }
    
    async function batchReview(action) {
      try {
        const res = await fetch(`${API_BASE}/crawler/jobs/batch-review`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            ids: Array.from(selectedIds), 
            action: action 
          })
        });
        const data = await res.json();
        
        if (data.code === 0) {
          selectedIds.clear();
          document.getElementById('select-all').checked = false;
          updateBatchButtons();
          loadStats();
          loadJobs(currentPage);
        }
      } catch (e) {
        alert('批量操作失败: ' + e.message);
      }
    }
    
    // 工具函数
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleString('zh-CN', { 
        month: 'short', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit' 
      });
    }
    
    function getStatusText(status) {
      const map = { pending: '待审核', approved: '已上线', rejected: '已拒绝' };
      return map[status] || status;
    }
    
    function getSourceTypeText(type) {
      const map = { 
        yupao: '鱼泡网', 
        rss: 'RSS订阅', 
        search: '搜索引擎',
        bbs: '论坛',
        wechat: '公众号'
      };
      return map[type] || type;
    }
  </script>
</body>
</html>
