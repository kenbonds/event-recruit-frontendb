<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>召集吧运营数据看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
        }

        .header .refresh-time {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .kpi-card .label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .kpi-card .value {
            color: #333;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kpi-card .delta {
            font-size: 14px;
        }

        .kpi-card .delta.positive {
            color: #22c55e;
        }

        .kpi-card .delta.negative {
            color: #ef4444;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .chart-card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 16px;
            border-left: 4px solid #667eea;
            padding-left: 12px;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        .chart-container.large {
            height: 400px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert-box {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #7f1d1d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .info-box {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #1e40af;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .funnel-steps {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 16px;
        }

        .funnel-step {
            text-align: center;
            flex: 1;
            min-width: 150px;
        }

        .funnel-step .step-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            margin: 0 auto 8px;
        }

        .funnel-step .step-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }

        .funnel-step .step-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .funnel-step .step-rate {
            font-size: 12px;
            color: #22c55e;
            margin-top: 4px;
        }

        .funnel-step .step-rate.warning {
            color: #f59e0b;
        }

        .funnel-step .step-rate.danger {
            color: #ef4444;
        }

        .api-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .api-status.online {
            background: #dcfce7;
            color: #166534;
        }

        .api-status.offline {
            background: #fee2e2;
            color: #991b1b;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .kpi-cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div>
                <h1>📊 召集吧运营数据看板</h1>
                <div class="subtitle">召集，让成长发生</div>
                <div class="refresh-time" id="refreshTime">
                    <span class="api-status" id="apiStatus">连接中...</span>
                    <span id="lastUpdate"></span>
                </div>
            </div>
            <button class="refresh-btn" onclick="loadDashboard()">
                🔄 刷新数据
            </button>
        </div>

        <!-- 提示信息 -->
        <div id="infoBox" class="info-box">
            <span>ℹ️</span>
            <span id="infoMessage">数据加载中...</span>
        </div>

        <!-- KPI 卡片 -->
        <div class="kpi-cards" id="kpiCards">
            <div class="loading">加载中</div>
        </div>

        <!-- 漏斗分析 -->
        <div class="chart-card full-width">
            <h2>🎯 发起活动漏斗转化分析（最近7天）</h2>
            <div class="chart-container large">
                <canvas id="funnelChart"></canvas>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-grid">
            <!-- 用户增长趋势 -->
            <div class="chart-card">
                <h2>📈 活动类型发布趋势（最近90天）</h2>
                <div class="chart-container">
                    <canvas id="typeTrendChart"></canvas>
                </div>
            </div>

            <!-- 活动类型分布 -->
            <div class="chart-card">
                <h2>🏷️ 活动类型分布</h2>
                <div class="chart-container">
                    <canvas id="typeDistChart"></canvas>
                </div>
            </div>

            <!-- 氛围风格分布 -->
            <div class="chart-card">
                <h2>🎨 活动氛围分布</h2>
                <div class="chart-container">
                    <canvas id="styleChart"></canvas>
                </div>
            </div>

            <!-- 用户画像分布 -->
            <div class="chart-card">
                <h2>👤 用户学历分布</h2>
                <div class="chart-container">
                    <canvas id="eduChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API 配置
        const API_BASE = 'http://localhost:3000/api/v1';

        // 全局图表实例
        let funnelChart, typeTrendChart, typeDistChart, styleChart, eduChart;

        // 类型标签映射
        const TYPE_LABELS = {
            'career': '事业共创',
            'training': '技能研习',
            'hobby': '兴趣爱好',
            'social': '社交结识',
            'mindfulness': '心灵成长',
            'untagged': '未分类'
        };

        // 氛围标签映射
        const STYLE_LABELS = {
            'relaxed': '轻松随意',
            'professional': '专业严谨',
            'enthusiastic': '热情活跃',
            'quiet': '静谧内敛',
            'unset': '未设置'
        };

        // 学历标签映射
        const EDU_LABELS = {
            0: '未知',
            1: '高中及以下',
            2: '大专',
            3: '本科',
            4: '硕士',
            5: '博士'
        };

        // 颜色配置
        const COLORS = {
            primary: '#667eea',
            secondary: '#764ba2',
            success: '#22c55e',
            warning: '#f59e0b',
            danger: '#ef4444',
            palette: ['#667eea', '#764ba2', '#f97316', '#22c55e', '#3b82f6', '#ec4899']
        };

        // 初始化
        async function init() {
            await loadDashboard();
        }

        // 加载看板数据
        async function loadDashboard() {
            updateInfo('正在加载实时数据...');
            updateApiStatus('offline');

            try {
                // 并行加载所有数据（设置超时）
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000); // 10秒超时

                const [overviewRes, funnelRes, typeTrendRes] = await Promise.all([
                    fetchWithTimeout(`${API_BASE}/analytics/overview`, { signal: controller.signal }),
                    fetchWithTimeout(`${API_BASE}/analytics/funnel?days=7`, { signal: controller.signal }),
                    fetchWithTimeout(`${API_BASE}/analytics/type-trend?days=90&granularity=week`, { signal: controller.signal })
                ]);

                clearTimeout(timeoutId);

                const [overviewData, funnelData, typeTrendData] = await Promise.all([
                    overviewRes.json(),
                    funnelRes.json(),
                    typeTrendRes.json()
                ]);

                // 验证响应
                if (overviewData.code !== 0 || funnelData.code !== 0 || typeTrendData.code !== 0) {
                    throw new Error('API返回错误数据');
                }

                // 渲染所有组件
                renderKPICards(overviewData);
                renderFunnel(funnelData);
                renderTypeTrend(typeTrendData);
                renderTypeDist(overviewData);
                renderStyleDist(overviewData);
                renderEduDist(overviewData);

                // 更新状态
                updateInfo('✅ 数据加载成功');
                updateApiStatus('online');
                updateRefreshTime();
                hideInfoAfter(5000);

            } catch (error) {
                console.error('加载失败:', error);
                updateInfo('⚠️ 后端服务未响应，使用演示数据');
                updateApiStatus('offline');

                // 使用演示数据
                loadDemoData();
            }
        }

        // 带超时的fetch
        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), options.timeout || 5000);

            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        // 加载演示数据
        function loadDemoData() {
            renderDemoKPICards();
            renderDemoFunnel();
            renderDemoTypeTrend();
            renderDemoTypeDist();
            renderDemoStyleDist();
            renderDemoEduDist();
        }

        // 渲染KPI卡片
        function renderKPICards(data) {
            const stats = data.data.stats;

            const kpis = [
                {
                    label: '总活动数',
                    value: stats.total_events || 0,
                    delta: `本月新增 ${stats.events_this_month || 0}`,
                    deltaPositive: true
                },
                {
                    label: '总用户数',
                    value: stats.total_users || 0,
                    delta: '活跃用户',
                    deltaPositive: true
                },
                {
                    label: '总报名数',
                    value: stats.total_regs || 0,
                    delta: '参与度提升',
                    deltaPositive: true
                },
                {
                    label: '活跃活动',
                    value: stats.active_events || 0,
                    delta: `覆盖率 ${data.data.data_quality?.initiate_type_coverage || '0%'}`,
                    deltaPositive: true
                }
            ];

            document.getElementById('kpiCards').innerHTML = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="label">${kpi.label}</div>
                    <div class="value">${kpi.value.toLocaleString()}</div>
                    <div class="delta ${kpi.deltaPositive ? 'positive' : 'negative'}">${kpi.delta}</div>
                </div>
            `).join('');
        }

        // 渲染漏斗分析
        function renderFunnel(data) {
            const funnel = data.data.funnel.funnel;
            const ctx = document.getElementById('funnelChart').getContext('2d');

            if (funnelChart) funnelChart.destroy();

            funnelChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: funnel.map(s => s.name),
                    datasets: [{
                        label: '人数',
                        data: funnel.map(s => s.count),
                        backgroundColor: [
                            'rgba(102, 126, 234, 0.8)',
                            'rgba(118, 75, 162, 0.8)',
                            'rgba(249, 115, 22, 0.8)',
                            'rgba(34, 197, 94, 0.8)'
                        ],
                        borderColor: COLORS.palette.slice(0, 4),
                        borderWidth: 2,
                        borderRadius: 8
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const step = funnel[context.dataIndex];
                                    return [
                                        `人数: ${step.count}`,
                                        `步骤转化率: ${step.step_rate}%`,
                                        `总体转化率: ${step.total_rate}%`,
                                        `流失: ${step.drop}`
                                    ];
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        y: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 渲染类型趋势
        function renderTypeTrend(data) {
            const series = data.data.series;
            const ctx = document.getElementById('typeTrendChart').getContext('2d');

            if (typeTrendChart) typeTrendChart.destroy();

            const allPeriods = [...new Set(series.flatMap(s => s.data.map(d => d.period)))].sort();

            const datasets = series.map((s, index) => ({
                label: s.label,
                data: allPeriods.map(period => {
                    const found = s.data.find(d => d.period === period);
                    return found ? found.count : 0;
                }),
                borderColor: COLORS.palette[index % COLORS.palette.length],
                backgroundColor: COLORS.palette[index % COLORS.palette.length] + '20',
                fill: false,
                tension: 0.4,
                pointRadius: 3,
                pointHoverRadius: 6
            }));

            typeTrendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allPeriods,
                    datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                usePointStyle: true,
                                padding: 20
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        x: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 渲染类型分布
        function renderTypeDist(data) {
            const typeDist = data.data.type_distribution;

            const labels = Object.keys(typeDist).map(k => TYPE_LABELS[k] || k);
            const values = Object.values(typeDist);

            const ctx = document.getElementById('typeDistChart').getContext('2d');

            if (typeDistChart) typeDistChart.destroy();

            typeDistChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: COLORS.palette,
                        borderWidth: 3,
                        borderColor: '#fff',
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const total = values.reduce((a, b) => a + b, 0);
                                    const pct = ((context.raw / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.raw} (${pct}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // 渲染氛围分布
        function renderStyleDist(data) {
            const styleDist = data.data.style_distribution;

            const labels = Object.keys(styleDist).map(k => STYLE_LABELS[k] || k);
            const values = Object.values(styleDist);

            const ctx = document.getElementById('styleChart').getContext('2d');

            if (styleChart) styleChart.destroy();

            styleChart = new Chart(ctx, {
                type: 'polarArea',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: COLORS.palette.map(c => c + '80'),
                        borderColor: COLORS.palette,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                usePointStyle: true,
                                padding: 15,
                                font: {
                                    size: 11
                                }
                            }
                        }
                    }
                }
            });
        }

        // 渲染学历分布
        function renderEduDist(data) {
            // 从users数据中统计（需要在overview API中添加）
            const ctx = document.getElementById('eduChart').getContext('2d');

            if (eduChart) eduChart.destroy();

            // 暂时使用模拟数据
            const eduData = {
                labels: ['高中及以下', '大专', '本科', '硕士', '博士', '未知'],
                values: [5, 15, 60, 15, 3, 2]
            };

            eduChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: eduData.labels,
                    datasets: [{
                        label: '用户数',
                        data: eduData.values,
                        backgroundColor: COLORS.palette,
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: {
                            beginAtZero: true,
                            grid: {
                                color: 'rgba(0, 0, 0, 0.05)'
                            }
                        },
                        y: {
                            grid: {
                                display: false
                            }
                        }
                    }
                }
            });
        }

        // 演示数据渲染函数
        function renderDemoKPICards() {
            const kpis = [
                { label: '总活动数', value: 156, delta: '本月新增 23', deltaPositive: true },
                { label: '总用户数', value: 892, delta: '活跃用户 234', deltaPositive: true },
                { label: '总报名数', value: 456, delta: '参与度提升', deltaPositive: true },
                { label: '活跃活动', value: 89, delta: '覆盖率 78%', deltaPositive: true }
            ];
            document.getElementById('kpiCards').innerHTML = kpis.map(kpi => `
                <div class="kpi-card">
                    <div class="label">${kpi.label}</div>
                    <div class="value">${kpi.value.toLocaleString()}</div>
                    <div class="delta ${kpi.deltaPositive ? 'positive' : 'negative'}">${kpi.delta}</div>
                </div>
            `).join('');
        }

        function renderDemoFunnel() {
            const funnel = [
                { count: 342, name: '点击「发起」按钮', step_rate: 100, total_rate: 100 },
                { count: 287, name: '选择召集类型', step_rate: 83.9, total_rate: 83.9 },
                { count: 198, name: '填写表单', step_rate: 69.0, total_rate: 57.9 },
                { count: 156, name: '发布成功', step_rate: 78.8, total_rate: 45.6 }
            ];
            renderFunnel({ data: { funnel } });
        }

        function renderDemoTypeTrend() {
            // 模拟数据
            const series = [
                {
                    label: '事业共创',
                    data: Array.from({ length: 12 }, (_, i) => ({
                        period: `2026-W${String(9 + i).padStart(2, '0')}`,
                        count: Math.floor(Math.random() * 20) + 5
                    }))
                },
                {
                    label: '兴趣爱好',
                    data: Array.from({ length: 12 }, (_, i) => ({
                        period: `2026-W${String(9 + i).padStart(2, '0')}`,
                        count: Math.floor(Math.random() * 15) + 3
                    }))
                }
            ];
            renderTypeTrend({ data: { series } });
        }

        function renderDemoTypeDist() {
            renderTypeDist({
                data: {
                    type_distribution: {
                        'career': 45,
                        'training': 32,
                        'hobby': 38,
                        'social': 28,
                        'mindfulness': 13
                    }
                }
            });
        }

        function renderDemoStyleDist() {
            renderStyleDist({
                data: {
                    style_distribution: {
                        'relaxed': 52,
                        'professional': 48,
                        'enthusiastic': 31,
                        'quiet': 25,
                        'unset': 20
                    }
                }
            });
        }

        function renderDemoEduDist() {
            renderEduDist({});
        }

        // 更新提示信息
        function updateInfo(message) {
            document.getElementById('infoMessage').textContent = message;
        }

        function hideInfoAfter(ms) {
            setTimeout(() => {
                document.getElementById('infoBox').style.display = 'none';
            }, ms);
        }

        // 更新API状态
        function updateApiStatus(status) {
            const el = document.getElementById('apiStatus');
            el.className = `api-status ${status}`;
            el.textContent = status === 'online' ? '🟢 API在线' : '🔴 API离线';
        }

        // 更新刷新时间
        function updateRefreshTime() {
            const now = new Date();
            document.getElementById('lastUpdate').textContent =
                ` | 更新时间: ${now.toLocaleTimeString('zh-CN')}`;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
